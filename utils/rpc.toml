# 共用 RPC 設定（與 rpc_profiles.py 同目錄；複製 utils 整包即可帶走）
# ─────────────────────────────────────────────────────────────
# [chains.<key>] 的 <key> 對應業務 config 里的 chain 字串。
# 若某專案要加私鏈／測試鏈，在下面追加新段落即可。
#
# 欄位：name, chain_id, urls（必填若干 URL）, default（可選）
#       native_symbol, explorer_tx_url, poa（均可選）

# ─── Ethereum Mainnet ────────────────────────────────────────
[chains.eth_mainnet]
name = "Ethereum Mainnet"
chain_id = 1
native_symbol = "ETH"
poa = false
explorer_tx_url = "https://etherscan.io/tx/{tx_hash}"
default = "https://ethereum-rpc.publicnode.com"
urls = [
  "https://ethereum-rpc.publicnode.com",
  "https://eth.blockrazor.xyz",
  "https://eth.drpc.org",
  "https://0xrpc.io/eth",
]

